name = "ba-track"
main = "worker.js"
compatibility_date = "2024-11-01"

# ---- D1 (ฐานข้อมูล structured) ----
# สร้างด้วย:  wrangler d1 create ba-track   แล้วเอา database_id มาใส่
[[d1_databases]]
binding = "DB"
database_name = "ba-track"
database_id = "PUT-YOUR-D1-DATABASE-ID-HERE"

# ---- R2 (เก็บรูปภาพทั้งหมด) ----
# สร้างด้วย:  wrangler r2 bucket create ba-track-images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "ba-track-images"

# ---- ตัวแปร (ไม่ลับ) ----
[vars]
# โดเมนที่อนุญาตให้เรียก API (CORS). "*" = ทุกที่ (ใช้ตอนทดสอบเท่านั้น)
ALLOW_ORIGIN = "*"

# ---- ค่าลับ: ตั้งด้วยคำสั่ง (อย่าใส่ในไฟล์นี้!) ----
#   wrangler secret put LINE_CHANNEL_ACCESS_TOKEN   # token ของ LINE Official Account
#   wrangler secret put LINE_CHANNEL_SECRET         # สำหรับ verify webhook signature
#   wrangler secret put ADMIN_PIN                    # (ออปชัน) PIN ป้องกันการตั้งค่า
